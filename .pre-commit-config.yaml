repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: terraform-fmt
        name: Terraform Format (Docker)
        language: docker_image
        entry: hashicorp/terraform:latest
        args: [fmt, -recursive, .]
        pass_filenames: false
        files: \.(tf|tfvars)$

      - id: checkov
        name: Checkov (Docker)
        language: docker_image
        entry: bridgecrew/checkov:latest
        args: [-d, .]
        pass_filenames: false
        files: \.tf$
